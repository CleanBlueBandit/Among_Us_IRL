<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting</title>
    <style>
        .stable{
            color: green;
        }
        .unstable{
            color: red;
        }
    </style>
</head>
<body>
    <h1>Start anytime</h1>
    <p id="usr"></p>
    <p id="id"></p>
    <p id="host"></p>
    <p id="players"></p>
    <hr>


    <div style="display: flex;">
        <button onclick="down()">&lt;</button>
        <p style="margin: 10px" id="show">0</p>
        <button onclick="up()">&gt;</button>
    </div>
    <button style="margin-top: 10px;" onclick="create()">Create dummy players</button>
    <p id="server_response"></p>
    <hr>

    
    <button onclick="post_start()">start game</button>
    <a href="/logout"><button>leave</button></a>


    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io("http://localhost:6767");

        let clientAnimationId = null;

        socket.on("player_data_request", (data) => {
            document.getElementById("usr").innerText = "username: " + data.username;
            document.getElementById("id").innerText = "id: " + data.id;
        });

        socket.on("game_data_request", (data) => {
            document.getElementById("players").innerText = "players: " + data.playerCount;
            if(data.started){
                windows.location.href("/dashboard")
            }
        })

        socket.on("Err", (data) => {
            console.error("Server error\n" + data.error);
        });

        function post_start(){
            fetch('http://localhost:6767/start', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(f => {window.location.href = "/dashboard"})
            .catch(error => {
                console.error(error);
            });
        }

        let amount = 0;

        function down(){
            if(amount > 0){
                amount -= 1;
                document.getElementById("show").innerText = amount;
            }
        }
        function up(){
            if(amount < 20){
                amount += 1;
                document.getElementById("show").innerText = amount;
            }
        }
        function create(){
            fetch('http://localhost:6767/addDummyPlayers', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    amnt: amount,
                })
            })
            .then(response => response.json()) 
            .then((data) => {
                document.getElementById("server_response").innerText = data.message;
            })
            .catch(error => {
                console.error(error);
            });
        }
        
    </script>
</body>
</body>
</html>
