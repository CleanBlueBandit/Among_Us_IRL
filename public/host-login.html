<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMOGUS</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <input type="text" placeholder="username" id="user" autocomplete="off">
    <input type="text" id="pass" placeholder="password" autocomplete="off">
    <div style="display: flex;">
        <button id="button-id" style="height: 20px;">enter</button>
        <input type="checkbox" id="serv">
        <p>server</p>
    </div>
    <script src="common.js"></script>
    <script>
        document.querySelector("#button-id").addEventListener('click', f => {
        const usr = document.getElementById("user").value;
        const pass = document.getElementById("pass").value;
        const serv = get("serv").checked;

        fetch('http://localhost:6767/enter-host', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username: usr,
                password: pass,
                server: serv
            })
        })
        .then(f => {window.location.href = '/waiting'})
        .catch(error => {
            console.error(error);
        });
        })
    </script>
</body>
</html>
